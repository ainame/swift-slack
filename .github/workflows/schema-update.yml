name: Schema Update

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual triggering

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: schema-update
  cancel-in-progress: true

jobs:
  schema-update:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Update apt package index
        run: sudo apt-get update

      - name: Setup Swiftly
        uses: vapor/swiftly-action@v0.2.1

      - name: Cache Swift build
        uses: actions/cache@v6
        with:
          path: .build
          key: ${{ runner.os }}-swift-build-${{ hashFiles('.swift-version', 'Package.swift', 'Package.resolved') }}

      - name: Install generator dependencies
        run: npm ci --ignore-scripts

      - name: Update schemas
        id: update
        run: |
          # Update submodules to latest
          make update

          # Generate and format generated code
          make generate

          # Supporting vendor and manifest changes do not open a PR on their own.
          GENERATED_CHANGES=$(git status --porcelain -- \
            Sources/SlackClient/WebAPI/Generated \
            Sources/SlackApp/Events/Generated \
            Sources/SlackModels/Generated)

          if [[ -n "$GENERATED_CHANGES" ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Generated code changes detected:"
            echo "$GENERATED_CHANGES"
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No schema or generated code changes"
          fi

      - name: Run tests
        if: steps.update.outputs.changes == 'true'
        run: swift test

      - name: Create Pull Request
        if: steps.update.outputs.changes == 'true'
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: |
            Sources/SlackClient/WebAPI/Generated/
            Sources/SlackApp/Events/Generated/
            Sources/SlackModels/Generated/
            vendor/
            Package.swift
            Package.resolved
          commit-message: |
            Update Slack API schemas

            This is an automated update of the Slack API schemas from upstream sources.
          branch: automated/schema-update
          delete-branch: true
          title: 'Update Slack API schemas'
          body-path: .github/pull_request_templates/schema-update.md
          labels: |
            schema-update
          reviewers: ainame

      - name: Dispatch pull request tests
        if: steps.update.outputs.changes == 'true' && steps.create-pr.outputs.pull-request-number
        # GITHUB_TOKEN suppresses push-triggered workflows, but workflow_dispatch is exempt.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run test.yml --ref automated/schema-update
